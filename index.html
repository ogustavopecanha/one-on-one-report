<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio</title><link rel="stylesheet" href="report.css"></head><body><div id="app"></div><script src="data.js"></script><script>const showLogin=()=>{document.getElementById('app').innerHTML='<div class="card"><h2>Relatorio One-on-One</h2><p>Acesso restrito</p><label>Usuario</label><input type="text" id="usr"><br><label>Senha</label><input type="password" id="pwd"><br><button onclick="login()">Acessar</button><p id="msg" style="color:red"></p></div>';};const login=()=>{const u=document.getElementById('usr').value,p=document.getElementById('pwd').value;if(typeof USERS!=="undefined"&&USERS[u]===p){showReport(u);}else{document.getElementById('msg').innerText="Invalido";}};const showReport=(u)=>{const d=DORES.map(o=>`<tr><td>${o.d}</td><td>${o.q}</td><td>${o.desc}</td><td>${o.s}</td></tr>`).join('');document.getElementById('app').innerHTML=`<div class="header"><h1>Relatorio</h1><button onclick="showLogin()">Sair</button></div><h3>Dashboard - ${u}</h3><table><thead><tr><th>Dor</th><th>Quant.</th><th>Descricao</th><th>Solucao Proposta</th></tr></thead><tbody>${d}</tbody></table>`;};showLogin();</script></body></html>
